name: Deploy SecondSolution to GhUAT

on:
  push:
    branches:
      - main
    paths:
      - solutions/SecondSolution/**
      - version-secondsolution.txt

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate to Power Platform
        run: |
          pac auth create `
            --tenant "${{ secrets.AZURE_TENANT_ID }}" `
            --applicationId "${{ secrets.AZURE_CLIENT_ID }}" `
            --clientSecret "${{ secrets.AZURE_CLIENT_SECRET }}" `
            --environment "${{ secrets.POWER_PLATFORM_ENV_URL }}"

# IMPORTANT:
      # pac solution export only exports the LAST PUBLISHED version of the solution.
      # If flows / apps are modified in GHDev but NOT published,
      # those changes will NOT be included in the exported ZIP.
      # Always ensure "Publish all customizations" is done in DEV
      # before triggering this pipeline.

      - name: Export solution from GHDev
        run: |
          pac solution export --name SecondSolution --path solutions --managed false

      - name: Import solution to GhUAT
        run: |
          pac solution import --path solutions/SecondSolution/SecondSolution.zip --force-overwrite --publish-changes
