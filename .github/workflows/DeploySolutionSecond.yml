name: Deploy SecondSolution to GhUAT

on:
  push:
    branches:
      - main
    paths:
      - solutions/SecondSolution/**
      - version-secondsolution.txt

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      # ✅ CRITICAL: Clear any cached PAC auth
      - name: Clear PAC auth
        run: |
          pac auth clear

      # ---------- AUTH TO DEV ----------
      - name: Authenticate to GHDev
        run: |
          pac auth create `
            --name ghdev `
            --tenant "${{ secrets.AZURE_TENANT_ID }}" `
            --applicationId "${{ secrets.AZURE_CLIENT_ID }}" `
            --clientSecret "${{ secrets.AZURE_CLIENT_SECRET }}" `
            --environment "${{ secrets.POWER_PLATFORM_ENV_URL }}"

          pac auth select --name ghdev

      - name: Export solution from GHDev
        run: |
          pac solution export --name SecondSolution --path solutions --managed false

      # ---------- AUTH TO UAT ----------
      - name: Authenticate to GhUAT
        run: |
          pac auth create `
            --name ghuat `
            --tenant "${{ secrets.AZURE_TENANT_ID }}" `
            --applicationId "${{ secrets.AZURE_CLIENT_ID }}" `
            --clientSecret "${{ secrets.AZURE_CLIENT_SECRET }}" `
            --url "${{ secrets.POWER_PLATFORM_UAT_ENV_URL }}"

          pac auth select --name ghuat

      - name: Import solution to GhUAT
        run: |
          pac solution import `
            --path solutions/SecondSolution/SecondSolution.zip `
            --force-overwrite `
            --publish-changes
